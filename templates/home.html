<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Search</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* ✅ Full responsive body */
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("/static/images/homebg_2.jpg") no-repeat center center/cover;
            padding: 20px;
        }

        /* ✅ Responsive container */
        .glass-container {
            width: 90%;
            height: 600px;
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.13);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            padding: 35px 25px;
            overflow: auto;  
        }

        /* Heading */
        h2 {
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Message */
        .msg {
            color: #ffffff;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Labels */
        label {
            display: block;
            margin-top: 15px;
            font-size: 14px;
            color: #ffffff;
        }

        /* Inputs */
        input {
            width: 100%;
            height: 45px;
            background-color: rgba(255,255,255,0.07);
            border-radius: 5px;
            padding: 0 10px;
            margin-top: 6px;
            font-size: 14px;
            border: none;
            outline: none;
            color: #ffffff;
        }

        ::placeholder {
            color: #e5e5e5;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffffff;
            color: #0f4c81;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #e6e6e6;
        }

        /* ✅ Mobile optimization */
        @media (max-width: 480px) {
            .glass-container {
                padding: 25px 18px;
            }

            h2 {
                font-size: 22px;
            }

            input {
                height: 40px;
                font-size: 13px;
            }

            button {
                font-size: 14px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<div class="glass-container">
    <h2>Search Companies</h2>
    <p class="msg">{{mssg}}</p>

    <form method="POST">
        <label for="log">Longitude</label>
        <input type="text" placeholder="Enter longitude" id="log" name="log" required>

        <label for="lat">Latitude</label>
        <input type="text" placeholder="Enter latitude" id="lat" name="lat" required>

         <label for="housing_median_age">housing_median_age</label>
        <input type="text" placeholder="AVG house age" id="housing_median_age" name="avg_house_age" required>

         <label for="total_rooms">total_rooms</label>
        <input type="text" placeholder="Enter total_rooms" id="total_rooms" name="Total_rooms" required>

         <label for="total_bedrooms">total_bedrooms</label>
        <input type="text" placeholder="Enter total_bedrooms" id="total_bedrooms" name="total_bedrooms" required>

         <label for="population">population</label>
        <input type="text" placeholder="Enter population" id="population" name="population" required>

         <label for="households">households</label>
        <input type="text" placeholder="Enter households" id="households" name="households" required>

        <label for="median_income">median_income</label>
        <input type="text" placeholder="Enter median_income" id="median_income" name="median_income" required>

        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>
