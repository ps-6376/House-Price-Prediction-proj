<!doctype html>
<html lang="en">
<head>
  <title>Signup Form</title>

  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-image: url("{{ url_for('static', filename='images/house_bg4.webp') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      width: 100%;
    }
    form {
      height: auto;
      width: 400px;
      background-color: rgba(255, 255, 255, 0.13);
      position: absolute;
      transform: translate(-50%, -50%);
      top: 50%;
      left: 50%;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
      padding: 40px 30px;
      color: white;
    }

    h3 {
      font-size: 28px;
      text-align: center;
      margin-bottom: 10px;
    }

    .message {
      text-align: center;
      font-size: 14px;
      margin-bottom: 10px;
      color: #ff6b6b;
    }

    label {
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      height: 45px;
      margin-top: 5px;
      padding: 0 10px;
      border-radius: 5px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      background: white;
      color: black;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 10px;
      color: white;
      text-decoration: none;
    }
  </style>
</head>

<body>

<form method="POST" >
  <h3>Sign Up</h3>

  <div class="message">{{ war }}</div>
  <div class="message">{{ msg }}</div>

  <label for="username">Username</label>
  <input
    type="text"
    id="username"
    name="username"
    placeholder="Enter your name"
    required
  >

  <label for="password">Password</label>
  <input
    type="password"
    id="password"
    name="password"
    placeholder="Enter password"
    required
  >

  <label for="confirm_password">Confirm Password</label>
  <input
    type="password"
    id="confirm_password"
    name="cnf_pass"
    placeholder="Confirm password"
    required
  >

  <button type="submit">Sign Up</button>

  <a href="{{ url_for('login') }}">Already have an account?</a>
</form>


</body>
</html>
